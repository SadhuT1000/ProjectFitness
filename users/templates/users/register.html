{% extends "base.html" %}
{% load static %}

{% block title %}Регистрация{% endblock %}

{% block content %}
<section class="auth-section" style="max-width:500px; margin:50px auto; padding: 0 20px;">
    <h2>Регистрация</h2>
    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit" class="enroll-btn">Зарегистрироваться</button>
    </form>
    <p>Уже есть аккаунт? <a href="{% url 'users:login' %}">Войти</a></p>
</section>
{% endblock %}
