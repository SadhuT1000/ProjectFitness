{% extends "base.html" %}
{% load static %}

{% block title %}Вход{% endblock %}

{% block content %}
<section class="auth-section" style="max-width:500px; margin:50px auto; padding: 0 20px;">
    <h2>Вход</h2>
    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit" class="enroll-btn">Войти</button>
    </form>
    <p>Нет аккаунта? <a href="{% url 'users:register' %}">Зарегистрироваться</a></p>
</section>
{% endblock %}
