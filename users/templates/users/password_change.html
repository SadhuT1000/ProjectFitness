{% extends "base.html" %}

{% block title %}Смена пароля{% endblock %}

{% block content %}
<div style="max-width:500px; margin:60px auto; padding:0 20px;">

    <h1 style="color:var(--color-primary); margin-bottom:8px;">Смена пароля</h1>
    <p style="color:var(--color-text-muted); margin-bottom:30px;">
        <a href="{% url 'users:profile' %}" style="color:var(--color-accent-rose);">← Вернуться в кабинет</a>
    </p>

    <div style="background:var(--color-surface); border:1px solid var(--color-border);
                border-radius:16px; padding:28px;">
        <form method="post">
            {% csrf_token %}
            {% for field in form %}
                <div style="margin-bottom:20px;">
                    <label style="display:block; font-weight:600; color:var(--color-primary);
                                  margin-bottom:6px;">{{ field.label }}</label>
                    {{ field }}
                    {% if field.errors %}
                        <p style="color:#c0756e; font-size:13px; margin-top:4px;">{{ field.errors.0 }}</p>
                    {% endif %}
                </div>
            {% endfor %}
            <button type="submit" class="enroll-btn" style="width:100%; text-align:center;">
                Сменить пароль
            </button>
        </form>
    </div>
</div>
{% endblock %}
